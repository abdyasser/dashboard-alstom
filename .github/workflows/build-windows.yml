name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 

    - name: Set up Node.js (Pour le Frontend)
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      working-directory: ./backend
      run: pyinstaller "Alstom IMFU Dashboard.spec"

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Alstom-IMFU-Dashboard-Windows
        path: backend/dist/Alstom IMFU Dashboard.exe
